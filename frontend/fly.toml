app = "run-sgroi"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  BACKEND_HOST = "run-sgroi-api.internal:8000"
  DNS_RESOLVER = "[fdaa::3]"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
